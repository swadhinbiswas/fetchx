name: Bug Report
description: Report a bug or unexpected behavior in FetchX
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I run fetchx with..., it shows... instead of..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "I expected fetchx to..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Set config to...
        2. Run `fetchx --...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Actual Output
      description: Paste the terminal output or screenshot.
      render: shell
      placeholder: "Paste your terminal output here"

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: "Paste your `~/.config/fetchx/config.toml` (or relevant parts)"
      render: toml
      placeholder: |
        image_backend = "kitty"
        image_source = "auto"

  - type: input
    id: version
    attributes:
      label: FetchX Version
      description: "Output of `fetchx --version`"
      placeholder: "fetchx 0.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Arch Linux
        - CachyOS
        - Ubuntu
        - Debian
        - Fedora
        - NixOS
        - Manjaro
        - EndeavourOS
        - openSUSE
        - Gentoo
        - Void Linux
        - Pop!_OS
        - Linux Mint
        - macOS
        - FreeBSD
        - Other (specify below)
    validations:
      required: true

  - type: dropdown
    id: terminal
    attributes:
      label: Terminal Emulator
      options:
        - kitty
        - Alacritty
        - WezTerm
        - foot
        - GNOME Terminal
        - Konsole
        - xterm
        - iTerm2
        - Terminal.app
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: de_wm
    attributes:
      label: Desktop Environment / Window Manager
      placeholder: "Hyprland, GNOME, KDE, Sway, i3, etc."

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information.
