name: Feature Request
description: Suggest a new feature or enhancement for FetchX
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea in detail.

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: Is this related to a problem? Describe what frustrates you.
      placeholder: "I'm always frustrated when..."

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
      placeholder: "It would be great if fetchx could..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Image Backend (kitty, sixel, chafa, etc.)
        - ASCII Art / Distro Logo
        - System Info Detection
        - Configuration
        - CLI Flags / Arguments
        - Performance
        - Output Formatting
        - Integration (Waybar, Polybar, etc.)
        - Platform Support (macOS, BSD, WSL)
        - Other
    validations:
      required: true

  - type: dropdown
    id: willingness
    attributes:
      label: Would you be willing to contribute this?
      options:
        - "Yes, I can submit a PR"
        - "I can help test it"
        - "No, just suggesting"

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Mockups, screenshots, links to similar tools, etc.
