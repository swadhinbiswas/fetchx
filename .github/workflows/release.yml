name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: fetchx
            archive: fetchx-linux-x86_64.tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: fetchx
            archive: fetchx-linux-aarch64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: fetchx
            archive: fetchx-macos-x86_64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: fetchx
            archive: fetchx-macos-aarch64.tar.gz
